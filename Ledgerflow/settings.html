<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LedgerFlow | Settings</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">LedgerFlow</div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
            <li><a href="invoices.html"><i class="fa-solid fa-file-invoice-dollar"></i> Invoices</a></li>
            <li><a href="clients..html"><i class="fa-solid fa-users"></i> Clients</a></li>
            <li class="active"><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
        <div class="security-status">
            <i class="fa-solid fa-shield-check"></i>
            <span>2FA ACTIVE</span>
        </div>
    </nav>
    <main class="content">
        <header class="top-header">
            <div class="breadcrumb">Security / Settings</div>
        </header>
        <section class="settings-box">
            <h2>Security Configuration</h2>
            <div class="setting-item">
                <div>
                    <strong>Two-Factor Authentication (2FA)</strong>
                    <p>Add an extra layer of security to your account.</p>
                </div>
                <div class="status-tag paid">Enabled</div>
            </div>
            <div class="setting-item">
                <div>
                    <strong>Login History</strong>
                    <p>Last login from Manila, PH (10.0.0.1)</p>
                </div>
                <button class="btn-outline">Review</button>
            </div>
        </section>
    </main>
</body>
</html>

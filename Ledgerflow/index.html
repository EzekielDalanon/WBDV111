<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LedgerFlow | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">LedgerFlow</div>
        <ul class="nav-links">
            <li class="active"><a href="index.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
            <li><a href="invoices.html"><i class="fa-solid fa-file-invoice-dollar"></i> Invoices</a></li>
            <li><a href="clients..html"><i class="fa-solid fa-users"></i> Clients</a></li>
            <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
        <div class="security-status">
            <i class="fa-solid fa-shield-check"></i>
            <span>2FA ACTIVE</span>
        </div>
    </nav>
    <main class="content">
        <header class="top-header">
            <div class="breadcrumb">Overview / Dashboard</div>
            <div class="user-profile"><i class="fa-solid fa-lock"></i> Secure Session</div>
        </header>
        <section class="action-bar">
            <h1>Welcome back, Admin</h1>
        </section>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Revenue</h3>
                <p>$45,200.00</p>
            </div>
            <div class="stat-card">
                <h3>Pending Invoices</h3>
                <p>12</p>
            </div>
            <div class="stat-card">
                <h3>Active Clients</h3>
                <p>48</p>
            </div>
        </div>
    </main>
</body>
</html>

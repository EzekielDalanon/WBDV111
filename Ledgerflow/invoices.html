<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LedgerFlow | Create Invoice</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">LedgerFlow</div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-table-columns"></i> Dashboard</a></li>
            <li class="active"><a href="invoices.html"><i class="fa-solid fa-file-invoice-dollar"></i> Invoices</a></li>
            <li><a href="clients..html"><i class="fa-solid fa-users"></i> Clients</a></li>
            <li><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
        <div class="security-status">
            <i class="fa-solid fa-shield-check"></i>
            <span>2FA ACTIVE</span>
        </div>
    </nav>

    <main class="content">
        <header class="top-header">
            <div class="breadcrumb">Invoices / New Secure Invoice</div>
        </header>

        <section class="form-container">
            <h1>Create Invoice</h1>
            <p class="subtitle">Generate a professional, encrypted invoice link for your client.</p>

            <form action="invoices.html" class="secure-form">
                <div class="form-group">
                    <label>Recipient Client</label>
                    <select required>
                        <option value="">Choose a client...</option>
                        <option value="1">Acme Corp</option>
                        <option value="2">Global Tech Industries</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Total Amount ($)</label>
                        <input type="number" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Invoice Reference ID</label>
                    <input type="text" value="#INV-004" disabled style="background: #f1f3f5; cursor: not-allowed;">
                </div>

                <div class="form-actions">
                    <a href="invoices.html" class="btn-outline" style="text-decoration: none;">Cancel</a>
                    <button type="submit" class="btn-primary">Generate & Save</button>
                </div>
            </form>
        </section>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | HealthSync</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Center login card specifically for this page */
        body { display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
        .login-wrap { flex: 1; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="wizard-container" style="text-align: center;">
        <h2 style="color: var(--trust-blue);">Admin Access</h2>
        <form action="admin-dashboard.html">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="primary-btn">LOGIN</button>
        </form>
        <a href="index.html" style="display: block; margin-top: 15px; color: #666; text-decoration: none; font-size: 0.9rem;">← Back to Site</a>
    </div>
</div>

</body>
</html>

<html lang="en">
<head>

<body>

<header class="navbar">
<div class="logo">🎧 <span>ESound</span></div>
<nav>

<section class="hero">
<h1>Tune into life</h1>
<p>Welcome back Ready to vibe?</p>

<h2>Your Profile</h2>
<div class="profile-card">

</div>
</div>
</section>

<section id="playlist" class="section">
<h2>Your Playlists</h2>

<div class="playlist-container">

<div class="playlist-card" onclick="playSong('irisSong')">
<img src="iris.jpg">
<h3>Iris</h3>
<p>1 Song</p>
<audio id="irisSong">

</div>

<div class="playlist-card" onclick="playSong('kalaSong')">
<img src="kala.jpg">
<h3>Kalapastangan</h3>

</div>

</div>

<section id="about" class="section">
<h2>About Us</h2>
<p class="about-text">
ESound is a music streaming platform to discover more music
and relapsing
</p>
</section>


<script>
function playSong(songId){

let songs=document.querySelectorAll("audio");
songs.forEach(song=>{
song.pause();
song.currentTime=0;
});

let song=document.getElementById(songId);
song.play();

}
</script>

</body>
